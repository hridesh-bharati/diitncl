<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Drishtee</title>

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
    rel="stylesheet">

  <!-- Font Awesome -->
  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" 
    crossorigin="anonymous" />

  <style>
    body {
      background: linear-gradient(135deg, #00268f, #0052cc);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    .offline-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      max-width: 400px;
      animation: fadeIn 1s ease forwards;
    }

    .offline-icon {
      font-size: 70px;
      margin-bottom: 20px;
      color: #ffd700;
      animation: pulse 1.5s infinite;
    }

    h1 {
      font-weight: 700;
      margin-bottom: 15px;
    }

    p {
      color: #f0f0f0;
      margin-bottom: 25px;
    }

    .btn-home {
      background: #ffd700;
      color: #00268f;
      font-weight: 600;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Optional floating circles background */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      animation: float 6s infinite;
    }

    .circle:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 15%; animation-delay: 0s; }
    .circle:nth-child(2) { width: 120px; height: 120px; top: 50%; left: 70%; animation-delay: 2s; }
    .circle:nth-child(3) { width: 60px; height: 60px; top: 80%; left: 30%; animation-delay: 4s; }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }

  </style>
</head>

<body>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="offline-container">
    <i class="fas fa-wifi-slash offline-icon"></i>
    <h1>You are offline</h1>
    <p>Please check your internet connection and try again.</p>
    <a href="/" class="btn btn-home btn-lg"><i class="fas fa-home me-2"></i>Go to Home</a>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
