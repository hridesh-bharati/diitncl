# .github/workflows/deploy.yml
name: Build & Deploy PWA

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Repository को चेकआउट करें
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Node.js सेटअप करें
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # बिल्ड को फ़ास्ट करने के लिए npm कैशे इनेबल किया

      # 3️⃣ Dependencies इंस्टॉल करें
      - name: Install dependencies
        run: npm ci

      # 4️⃣ GitHub Run Number को एनवायरनमेंट वेरिएबल में सेट करें
      # (यह वही वेरिएबल है जिसे vite.config.js में process.env.VITE_BUILD_VERSION से रीड किया जा रहा है)
      - name: Set build version
        run: |
          echo "VITE_BUILD_VERSION=${{ github.run_number }}" >> $GITHUB_ENV

      # 5️⃣ Production बिल्ड तैयार करें
      - name: Build Vite PWA
        run: npm run build

      # 6️⃣ GitHub Pages पर डिप्लॉय करें
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_history: true